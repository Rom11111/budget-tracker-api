services:
  mysql:
    image: mysql:8.4
    container_name: budget-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: budget_tracker
      MYSQL_USER: budget
      MYSQL_PASSWORD: budget
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ubudget", "-pbudget"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
