# Nom de l'application Spring Boot
spring.application.name=budget-tracker-api

# Connexion à la base MySQL (conteneur Docker, voir docker-compose.yml à la racine)
spring.datasource.url=jdbc:mysql://localhost:3306/budget_tracker
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=budget
spring.datasource.password=budget

# Hibernate met à jour les tables automatiquement
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL dans la console
spring.jpa.show-sql=true

# Clé secrète qui signe les tokens JWT (32 caractères minimum pour HS256).
# En production : à sortir du code (variable d'environnement) et à changer !
jwt.secret=cle-secrete-de-dev-budget-tracker-a-changer-en-prod

# Réponses d'erreur : le message oui, la stack trace non
server.error.include-message=always
server.error.include-stacktrace=never
