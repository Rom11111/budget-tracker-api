<div class="login-page">
  <div class="brand">
    <div class="brand-icon"><i class="icon-wallet"></i></div>
    <h1>Budget Tracker</h1>
    <p>Garde un œil sur tes dépenses</p>
  </div>

  <form class="card login-card" (ngSubmit)="submit()">
    <p class="form-title">
      {{ mode() === 'login' ? 'Connexion' : 'Créer un compte' }}
    </p>

    @if (error()) {
      <p class="banner error">{{ error() }}</p>
    }

    <div class="field">
      <label for="email">Email</label>
      <div class="input-wrap">
        <i class="icon-mail" aria-hidden="true"></i>
        <input id="email" name="email" type="email" [(ngModel)]="email"
               placeholder="toi@exemple.fr" autocomplete="email" required />
      </div>
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="input-wrap">
        <i class="icon-lock" aria-hidden="true"></i>
        <input id="password" name="password"
               [type]="showPassword() ? 'text' : 'password'"
               [(ngModel)]="password" placeholder="••••••••"
               [attr.autocomplete]="mode() === 'login' ? 'current-password' : 'new-password'"
               required />
        <button type="button" class="toggle-eye"
                [attr.aria-label]="showPassword() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
                (click)="showPassword.set(!showPassword())">
          <i [class]="showPassword() ? 'icon-eye-off' : 'icon-eye'"></i>
        </button>
      </div>
    </div>

    @if (mode() === 'register') {
      <div class="field">
        <label for="confirm">Confirmer le mot de passe</label>
        <div class="input-wrap">
          <i class="icon-lock" aria-hidden="true"></i>
          <input id="confirm" name="confirm"
                 [type]="showPassword() ? 'text' : 'password'"
                 [(ngModel)]="confirm" placeholder="••••••••"
                 autocomplete="new-password" required />
        </div>
      </div>
    }

    <button type="submit" class="btn primary submit">
      <i [class]="mode() === 'login' ? 'icon-log-in' : 'icon-user-plus'" aria-hidden="true"></i>
      {{ mode() === 'login' ? 'Se connecter' : 'Créer mon compte' }}
    </button>

    <p class="switch-mode">
      {{ mode() === 'login' ? 'Pas encore de compte ?' : 'Déjà un compte ?' }}
      <button type="button" (click)="toggleMode()">
        {{ mode() === 'login' ? 'Créer un compte' : 'Se connecter' }}
      </button>
    </p>
  </form>
</div>
