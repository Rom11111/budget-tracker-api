<form class="card form" (ngSubmit)="submit()">
  <p class="form-title">
    {{ isEditing ? 'Modifier' : (mode() === 'expense' ? 'Nouvelle dépense' : 'Nouveau revenu') }}
  </p>
  <div class="field">
    <label for="label">Libellé</label>
    <input id="label" name="label" type="text" [(ngModel)]="form.label" placeholder="Courses, Salaire..." required />
  </div>
  <div class="field">
    <label>Catégorie</label>
    <div class="chips">
      @for (cat of categories; track cat.id) {
        <button
          type="button"
          class="chip"
          [class.selected]="form.category === cat.id"
          (click)="selectCategory(cat.id)">
          <i class="icon-{{ cat.icon }}"></i> {{ cat.label }}
        </button>
      }
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label for="amount">Montant (€)</label>
      <input id="amount" name="amount" type="number" step="0.01" min="0" [(ngModel)]="form.amount" required />
    </div>
    <div class="field">
      <label for="date">Date</label>
      <input id="date" name="date" type="date" [(ngModel)]="form.date" required />
    </div>
  </div>
  <div class="actions">
    <button type="submit" class="btn primary">{{ isEditing ? 'Mettre à jour' : 'Ajouter' }}</button>
    <button type="button" class="btn" (click)="cancelled.emit()">Annuler</button>
  </div>
</form>
